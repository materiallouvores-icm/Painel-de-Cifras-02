<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>PAINEL DE CIFRAS</title>

  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="icone.png">

  <link rel="apple-touch-icon" href="icone.png">

  <meta
    name="theme-color"
    content="#020817"
  >

</head>

<body>

  <div class="background"></div>

  <div class="container">

    <div class="logo">
      PAINEL DE CIFRAS
    </div>

    <header class="topbar">

        <input
          type="text"
          id="searchInput"
          placeholder="Pesquisar louvor..."
        >

        <button id="searchBtn">
          Buscar
        </button>

      </div>

      <div class="tools">

        <button id="explorerBtn">
          Coletâneas
        </button>

      </div>

      <div id="results"></div>

    </header>

    <section class="playlist-section">

      <div class="playlist-title">
        LISTA DE LOUVORES
      </div>

      <div id="playlist"></div>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
